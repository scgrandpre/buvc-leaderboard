<style>
  :root {
    --navy: #0B1F42;
    --navy-700: #142951;
    --navy-600: #1b3463;
    --sky: #6BABC6;
    --sky-200: #cfe1ea;
    --sky-50: #eef5f8;
    --paper: #f6f4ef;
    --ink: #0B1F42;
    --ink-soft: #3b4a66;
    --line: rgba(11, 31, 66, 0.10);
    --gold: #d4a52a;
    --silver: #a9b4c2;
    --bronze: #b87333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  select, input { font-family: inherit; color: inherit; }

  .display { font-family: 'Anton', 'Oswald', sans-serif; letter-spacing: 0.01em; text-transform: uppercase; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .tabular { font-variant-numeric: tabular-nums; }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(11,31,66,0.18); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(11,31,66,0.32); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Fallback spinner */
  #boot { position: fixed; inset: 0; display: grid; place-items: center; background: var(--paper); z-index: 100; }
  #boot .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sky); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.4;} 50% { transform: scale(1.4); opacity: 1;} }
</style>

<script type="text/babel">
// shared.jsx — data shape, helpers, shared components

// ============ DATA PROCESSING ============
// Flatten all players from allTeams[]
const RAW_TEAMS = window.__BUVC_DATA__ || [];

// Generate friendly display names for players (jersey numbers only in source)
// Map jersey → a pool of plausible Boston-y first names; for now, show jersey + team clearly.
const ALL_PLAYERS = [];
let __pidx = 0;
RAW_TEAMS.forEach(t => {
  t.players.forEach(p => {
    // Skip ghost/empty players with zero activity across the board
    const hasActivity = (p.K || 0) + (p.SA || 0) + (p.DIG || 0) + (p.Serve_TA || 0) + (p.TA || 0) > 0;
    ALL_PLAYERS.push({
      id: `${p.team}-${p.jersey}-${__pidx++}`,
      jersey: String(p.jersey || '').trim(),
      name: p.name || `#${p.jersey}`,
      team: p.team,
      gender: p.gender,
      age: String(p.age),
      ageLabel: `${p.age}U`,
      K: +p.K || 0,
      E: +p.E || 0,
      TA: +p.TA || 0,
      ATK: +p.ATK_ || 0,
      ATK_PCT: +p['ATK%'] || 0,
      KILL_PCT: +p['KILL%'] || 0,
      KPS: +p['K/S'] || 0,
      K_Set: +p['K/Set'] || 0,
      SA: +p.SA || 0,
      SE: +p.SE || 0,
      Serve_TA: +p.Serve_TA || 0,
      Serve_PCT: +p.Serve_PCT || 0,
      DIG: +p.DIG || 0,
      SETS: +p.SETS || 0,
      D_Set: +p['D/Set'] || 0,
      _active: hasActivity,
    });
  });
});

const TEAMS = Array.from(new Set(ALL_PLAYERS.map(p => p.team))).sort();
const AGES = Array.from(new Set(ALL_PLAYERS.map(p => p.age))).sort();

// ============ CATEGORIES ============
// Used for leader tabs and top-3 podium
const CATEGORIES = [
  { id: 'kills',    label: 'Kills',      short: 'K',    stat: 'K',         fmt: v => Math.round(v), subStat: 'K_Set',    subLabel: 'K/SET',    subFmt: v => v.toFixed(2) },
  { id: 'kset',     label: 'Kills/Set',  short: 'K/S',  stat: 'K_Set',     fmt: v => v.toFixed(2),  subStat: 'K',        subLabel: 'TOTAL K',  subFmt: v => Math.round(v), minSets: 3 },
  { id: 'attack',   label: 'Attack %',   short: 'ATK%', stat: 'ATK_PCT',   fmt: v => (v*100).toFixed(1)+'%', subStat: 'TA', subLabel: 'ATTEMPTS', subFmt: v => Math.round(v), minAtk: 20 },
  { id: 'aces',     label: 'Aces',       short: 'SA',   stat: 'SA',        fmt: v => Math.round(v), subStat: 'Serve_PCT', subLabel: 'SERVE %', subFmt: v => (v*100).toFixed(0)+'%' },
  { id: 'serve',    label: 'Serve %',    short: 'SRV%', stat: 'Serve_PCT', fmt: v => (v*100).toFixed(1)+'%', subStat: 'Serve_TA', subLabel: 'ATTEMPTS', subFmt: v => Math.round(v), minSrv: 15 },
  { id: 'digs',     label: 'Digs',       short: 'DIG',  stat: 'DIG',       fmt: v => Math.round(v), subStat: 'D_Set',    subLabel: 'D/SET',    subFmt: v => v.toFixed(2) },
];

function qualifyPlayer(p, cat) {
  if (cat.minSets && p.SETS < cat.minSets) return false;
  if (cat.minAtk && p.TA < cat.minAtk) return false;
  if (cat.minSrv && p.Serve_TA < cat.minSrv) return false;
  return true;
}

function leadersFor(cat, players, limit = 20) {
  return players
    .filter(p => p._active && qualifyPlayer(p, cat))
    .slice()
    .sort((a,b) => (b[cat.stat] || 0) - (a[cat.stat] || 0))
    .slice(0, limit);
}

// Team aggregates
function aggregateTeams(players) {
  const m = {};
  players.forEach(p => {
    const k = `${p.team}|${p.gender}|${p.age}`;
    if (!m[k]) m[k] = {
      id: k, team: p.team, gender: p.gender, age: p.age, ageLabel: `${p.age}U`,
      K:0, SA:0, DIG:0, SE:0, E:0, TA:0, Serve_TA:0, sets:0, players: []
    };
    const t = m[k];
    t.players.push(p);
    t.K += p.K; t.SA += p.SA; t.DIG += p.DIG;
    t.SE += p.SE; t.E += p.E; t.TA += p.TA; t.Serve_TA += p.Serve_TA;
    t.sets = Math.max(t.sets, p.SETS);
  });
  return Object.values(m).map(t => ({
    ...t,
    K_Set: t.sets > 0 ? t.K / t.sets : 0,
    A_Set: t.sets > 0 ? t.SA / t.sets : 0,
    D_Set: t.sets > 0 ? t.DIG / t.sets : 0,
    ATK_PCT: t.TA > 0 ? (t.K - t.E) / t.TA : 0,
    Serve_PCT: t.Serve_TA > 0 ? (t.Serve_TA - t.SE) / t.Serve_TA : 0,
  }));
}

// ============ SMALL COMPONENTS ============
function Chip({ children, tone = 'default', className = '', style }) {
  const bg = {
    default: 'rgba(11,31,66,0.06)',
    navy: '#0B1F42',
    sky: '#6BABC6',
    outline: 'transparent',
  }[tone];
  const fg = {
    default: '#0B1F42',
    navy: '#ffffff',
    sky: '#ffffff',
    outline: '#0B1F42',
  }[tone];
  return (
    <span className={className} style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '3px 8px', borderRadius: 999,
      fontSize: 10.5, fontWeight: 600, letterSpacing: '0.06em',
      textTransform: 'uppercase',
      background: bg, color: fg,
      border: tone === 'outline' ? '1px solid rgba(11,31,66,0.22)' : 'none',
      ...style
    }}>{children}</span>
  );
}

function JerseyAvatar({ jersey, size = 36, tone = 'navy' }) {
  const bg = tone === 'navy' ? '#0B1F42' : tone === 'sky' ? '#6BABC6' : '#ffffff';
  const fg = tone === 'white' ? '#0B1F42' : '#ffffff';
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: bg, color: fg,
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: 'Anton, Oswald', fontSize: size * 0.46, fontWeight: 900,
      letterSpacing: '0.02em',
      border: tone === 'white' ? '1.5px solid #0B1F42' : 'none',
      flexShrink: 0,
    }}>{String(jersey).replace(/^#/, '')}</div>
  );
}

function MedalBadge({ rank, size = 22 }) {
  const color = rank === 1 ? 'var(--gold)' : rank === 2 ? 'var(--silver)' : 'var(--bronze)';
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      width: size, height: size, borderRadius: '50%',
      background: color, color: '#fff',
      fontFamily: 'Anton, Oswald', fontSize: size * 0.55, fontWeight: 900,
      boxShadow: 'inset 0 -2px 0 rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.15)',
    }}>{rank}</span>
  );
}

// ============ PLAYER DETAIL MODAL ============
function PlayerModal({ player, onClose, allPlayers }) {
  if (!player) return null;
  // Rank across club in each category (qualified)
  const ranks = CATEGORIES.map(cat => {
    const pool = allPlayers.filter(p => p._active && qualifyPlayer(p, cat))
      .sort((a,b) => (b[cat.stat] || 0) - (a[cat.stat] || 0));
    const idx = pool.findIndex(p => p.id === player.id);
    return { cat, rank: idx >= 0 ? idx + 1 : null, total: pool.length, qualifies: qualifyPlayer(player, cat) };
  });

  return (
    <div
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0, zIndex: 500,
        background: 'rgba(11,31,66,0.55)',

          display: 'flex', alignItems: 'center', gap: 20,
          borderRadius: '12px 12px 0 0',
          position: 'relative', overflow: 'hidden',
        }}>
          <div style={{
            position: 'absolute', right: -40, top: -40, width: 200, height: 200,
            border: '1px solid rgba(107,171,198,0.25)', borderRadius: '50%',
          }}/>

            position: 'absolute', right: 20, bottom: -60, width: 150, height: 150,
            border: '1px solid rgba(107,171,198,0.18)', borderRadius: '50%',
          }}/>
          <JerseyAvatar jersey={player.jersey} size={72} tone="sky"/>
          <div style={{ flex: 1, position: 'relative' }}>
            <div className="display" style={{ fontSize: 36, lineHeight: 1, marginBottom: 6 }}>
              {player.name}
            </div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
              <Chip tone="sky" style={{ background: 'rgba(107,171,198,0.3)', color: '#fff', border: '1px solid rgba(107,171,198,0.5)' }}>{player.team}</Chip>

            position: 'absolute', top: 16, right: 16,

<script type="text/babel">

function EditorialDirection({ filters, onFilter, onSelect }) {

        if (!p.name.toLowerCase().includes(s) && !p.team.toLowerCase().includes(s)) return false;
      }
      return true;

        return ((av||0) - (bv||0)) * dir;

function CardsDirection({ filters, onFilter, onSelect }) {
  const [view, setView] = React.useState('individual');

      if (filters.gender !== 'Both' && p.gender !== filters.gender) return false;
      if (filters.age && p.age !== filters.age) return false;
      if (filters.team && p.team !== filters.team) return false;
      if (filters.search) {
        const s = filters.search.toLowerCase();
        if (!p.name.toLowerCase().includes(s) && !p.team.toLowerCase().includes(s)) return false;

    });

  const sorted = React.useMemo(() => {
    return filteredPlayers
      .filter(p => qualifyPlayer(p, cat))
      .slice()
      .sort((a,b) => {
        const d = sortDesc ? -1 : 1;
        return ((a[cat.stat] || 0) - (b[cat.stat] || 0)) * d;
      });
  }, [filteredPlayers, cat, sortDesc]);

  const top3 = sorted.slice(0, 3);

}

          options={[['', 'Any Age'], ...AGES.map(a => [a, `${a}U`])]}/>
        <DarkSelect value={filters.team} onChange={v => onFilter({ ...filters, team: v })}
          options={[['', 'Any Team'], ...TEAMS.map(t => [t, t])]}/>

        <div style={{ position: 'relative' }}>
          <svg width="14" height="14" viewBox="0 0 16 16" style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', opacity: 0.6 }}>
            <circle cx="7" cy="7" r="5" fill="none" stroke="#6BABC6" strokeWidth="1.5"/>
            <path d="M11 11l4 4" stroke="#6BABC6" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
          <input placeholder="Search…" value={filters.search}
            onChange={e => onFilter({ ...filters, search: e.target.value })}
            style={{
              padding: '7px 10px 7px 30px', fontSize: 12, width: 180,
              background: 'rgba(107,171,198,0.08)',
              border: '1px solid rgba(107,171,198,0.3)', borderRadius: 6,
              color: '#E8EEF4',
            }}/>
        </div>

        <div style={{ flex: 1 }}/>

        {/* category pills */}
        <div style={{ display: 'flex', gap: 4 }}>
          {CATEGORIES.map(c => {
            const active = c.id === catId;
            return (
              <button key={c.id} onClick={() => { setCatId(c.id); setSortCol(c.stat); setSortDir('desc'); }} style={{
                padding: '6px 12px', fontSize: 11, fontWeight: 700,
                letterSpacing: '0.08em', textTransform: 'uppercase', borderRadius: 4,
                background: active ? 'var(--sky)' : 'transparent',
                color: active ? '#0B1F42' : 'rgba(232,238,244,0.75)',
                border: '1px solid ' + (active ? 'var(--sky)' : 'rgba(107,171,198,0.25)'),
              }}>{c.short}</button>
            );
          })}
        </div>
      </div>

      {/* ===== MAIN GRID ===== */}
      <div style={{ display: 'grid', gridTemplateColumns: 'minmax(320px, 380px) 1fr', gap: 0, minHeight: 'calc(100vh - 150px)' }}>

        {/* ===== LEFT: TOP 10 LEADERS ===== */}
        <div style={{
          borderRight: '1px solid rgba(107,171,198,0.15)',
          background: '#071425', padding: '20px 20px 40px',
        }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 14 }}>
            <div>
              <div className="display" style={{ fontSize: 22, color: '#fff', letterSpacing: 0.3 }}>{cat.label}</div>
              <div style={{ fontSize: 10, color: 'var(--sky)', letterSpacing: '0.2em', fontWeight: 700 }}>TOP 10 · CLUB-WIDE</div>
            </div>
          </div>

          {window.__TWEAKS__.showPodium && (
            <div style={{ display: 'grid', gap: 6 }}>
              {catLeaders.map((p, i) => {
                const rank = i + 1;
                const maxVal = catLeaders[0] ? catLeaders[0][cat.stat] : 1;
                const pct = (p[cat.stat] || 0) / (maxVal || 1);
                const isTop = rank <= 3;
                return (
                  <button key={p.id} onClick={() => onSelect(p)} style={{
                    display: 'block', textAlign: 'left', width: '100%',
                    padding: '10px 12px', borderRadius: 6,
                    background: isTop ? 'rgba(107,171,198,0.08)' : 'transparent',
                    border: '1px solid ' + (isTop ? 'rgba(107,171,198,0.25)' : 'rgba(107,171,198,0.08)'),
                    cursor: 'pointer', transition: 'background 0.15s',
                    position: 'relative', overflow: 'hidden',
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(107,171,198,0.15)'}
                  onMouseLeave={e => e.currentTarget.style.background = isTop ? 'rgba(107,171,198,0.08)' : 'transparent'}
                  >
                    {/* bar background */}
                    <div style={{
                      position: 'absolute', left: 0, top: 0, bottom: 0,
                      width: `${pct * 100}%`,
                      background: 'linear-gradient(90deg, rgba(107,171,198,0.15) 0%, rgba(107,171,198,0.02) 100%)',
                      pointerEvents: 'none',
                    }}/>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, position: 'relative' }}>
                      {window.__TWEAKS__.showMedals && isTop ? (
                        <MedalBadge rank={rank} size={22}/>
                      ) : (
                        <div className="display tabular" style={{
                          fontSize: 16, width: 22, textAlign: 'center',
                          color: 'rgba(232,238,244,0.55)',
                        }}>{rank}</div>
                      )}
                      <JerseyAvatar jersey={p.jersey} size={28} tone="sky"/>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div className="display" style={{ fontSize: 14, color: '#fff', letterSpacing: 0.2, lineHeight: 1.1 }}>
                          {p.name}
                        </div>
                        <div style={{ fontSize: 10, color: 'rgba(232,238,244,0.55)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {p.team} · {p.ageLabel}
                        </div>
                      </div>
                      <div style={{ textAlign: 'right' }}>
                        <div className="display tabular" style={{ fontSize: 18, color: 'var(--sky)', lineHeight: 1 }}>
                          {cat.fmt(p[cat.stat])}
                        </div>
                        <div className="mono" style={{ fontSize: 9, color: 'rgba(232,238,244,0.5)', letterSpacing: '0.05em' }}>
                          {cat.subFmt(p[cat.subStat])} {cat.subLabel}
                        </div>
                      </div>
                    </div>
                  </button>
                );
              })}
              {catLeaders.length === 0 && (
                <div style={{ padding: 20, textAlign: 'center', fontSize: 12, color: 'rgba(232,238,244,0.5)' }}>No qualifiers.</div>
              )}
            </div>
          )}
        </div>

        {/* ===== RIGHT: FULL TABLE ===== */}
        <div style={{ padding: '20px 24px 40px', overflow: 'hidden' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 14 }}>
            <div>
              <div className="display" style={{ fontSize: 22, color: '#fff' }}>{view === 'individual' ? 'All Players' : 'All Teams'}</div>
              <div style={{ fontSize: 10, color: 'var(--sky)', letterSpacing: '0.2em', fontWeight: 700 }}>
                {tableRows.length} ENTRIES · SORTED BY {sortCol.toUpperCase()} {sortDir === 'desc' ? '↓' : '↑'}
              </div>
            </div>
          </div>

          <BroadcastTable view={view} data={tableRows} sortCol={sortCol} sortDir={sortDir} sortBy={sortBy} onSelect={onSelect}/>
        </div>
      </div>
    </div>
  );
}

function BroadcastTable({ view, data, sortCol, sortDir, sortBy, onSelect }) {
  const cols = view === 'individual' ? [
    { id: 'rank', l: '#', w: 40, sortable: false },
    { id: 'name', l: 'Player', stat: 'name', align: 'left' },
    { id: 'team', l: 'Team', stat: 'team', align: 'left' },
    { id: 'age', l: 'AGE', stat: 'age', w: 50 },
    { id: 'K', l: 'K', stat: 'K', w: 56, align: 'right' },
    { id: 'K_Set', l: 'K/S', stat: 'K_Set', w: 56, align: 'right' },
    { id: 'ATK_PCT', l: 'ATK%', stat: 'ATK_PCT', w: 62, align: 'right', pct: true },
    { id: 'SA', l: 'SA', stat: 'SA', w: 48, align: 'right' },
    { id: 'Serve_PCT', l: 'SRV%', stat: 'Serve_PCT', w: 62, align: 'right', pct: true },
    { id: 'DIG', l: 'DIG', stat: 'DIG', w: 56, align: 'right' },
    { id: 'SETS', l: 'SETS', stat: 'SETS', w: 50, align: 'right' },
  ] : [
    { id: 'rank', l: '#', w: 40, sortable: false },
    { id: 'team', l: 'Team', stat: 'team', align: 'left' },
    { id: 'age', l: 'AGE', stat: 'age', w: 50 },
    { id: 'gender', l: 'G', stat: 'gender', w: 50 },
    { id: 'K', l: 'KILLS', stat: 'K', w: 72, align: 'right' },
    { id: 'K_Set', l: 'K/S', stat: 'K_Set', w: 56, align: 'right' },
    { id: 'SA', l: 'ACES', stat: 'SA', w: 64, align: 'right' },
    { id: 'DIG', l: 'DIGS', stat: 'DIG', w: 64, align: 'right' },
    { id: 'sets', l: 'SETS', stat: 'sets', w: 56, align: 'right' },
  ];

  return (
    <div style={{
      border: '1px solid rgba(107,171,198,0.2)', borderRadius: 6, overflow: 'hidden',
      background: '#081629',
    }}>
      <div style={{ overflowX: 'auto', maxHeight: 'calc(100vh - 280px)', overflowY: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead style={{ position: 'sticky', top: 0, zIndex: 2 }}>
            <tr style={{ background: '#0B1F42', borderBottom: '2px solid var(--sky)' }}>
              {cols.map(c => (
                <th key={c.id} onClick={() => c.sortable !== false && c.stat && sortBy(c.stat)}
                  style={{
                    padding: '10px 10px', width: c.w, textAlign: c.align || 'left',
                    fontSize: 10, fontWeight: 700, letterSpacing: '0.1em',
                    color: sortCol === c.stat ? 'var(--sky)' : 'rgba(232,238,244,0.7)',
                    cursor: c.sortable !== false ? 'pointer' : 'default',
                    whiteSpace: 'nowrap', userSelect: 'none',
                  }}>
                  {c.l}{c.sortable !== false && sortCol === c.stat && (sortDir === 'desc' ? ' ↓' : ' ↑')}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {data.map((row, i) => {
              const showMedal = window.__TWEAKS__.showMedals && i < 3;
              return (
                <tr key={row.id || `${row.team}-${i}`}
                  onClick={() => view === 'individual' && onSelect(row)}
                  style={{
                    borderBottom: '1px solid rgba(107,171,198,0.08)',
                    background: i % 2 === 0 ? 'transparent' : 'rgba(107,171,198,0.03)',
                    cursor: view === 'individual' ? 'pointer' : 'default',
                    transition: 'background 0.12s',
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(107,171,198,0.1)'}
                  onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? 'transparent' : 'rgba(107,171,198,0.03)'}
                >
                  {cols.map(c => {
                    let content;
                    const val = row[c.stat];
                    if (c.id === 'rank') {
                      content = showMedal
                        ? <MedalBadge rank={i+1} size={18}/>
                        : <span className="display tabular" style={{ fontSize: 13, color: 'rgba(232,238,244,0.55)' }}>{i+1}</span>;
                    } else if (c.id === 'name') {
                      content = (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <JerseyAvatar jersey={row.jersey} size={22} tone="sky"/>
                          <span className="display" style={{ fontSize: 13, color: '#fff', letterSpacing: 0.2 }}>{row.name}</span>
                        </div>
                      );
                    } else if (c.id === 'team' && view === 'individual') {
                      content = <span style={{ fontSize: 11, color: 'rgba(232,238,244,0.75)' }}>{row.team}</span>;
                    } else if (c.id === 'team' && view === 'team') {
                      content = <span className="display" style={{ fontSize: 14, color: '#fff' }}>{row.team}</span>;
                    } else if (c.id === 'age') {
                      content = <span className="mono" style={{ fontSize: 11, color: 'var(--sky)' }}>{row.ageLabel}</span>;
                    } else if (c.id === 'gender') {
                      content = <span className="mono" style={{ fontSize: 11, color: 'rgba(232,238,244,0.7)' }}>{row.gender === 'Boys' ? 'M' : 'F'}</span>;
                    } else if (c.pct) {
                      content = <span className="mono tabular" style={{ fontSize: 11, color: val > 0 ? '#fff' : 'rgba(232,238,244,0.35)' }}>{val > 0 ? (val*100).toFixed(1)+'%' : '—'}</span>;
                    } else if (c.stat === 'K_Set' || c.stat === 'D_Set' || c.stat === 'A_Set') {
                      content = <span className="mono tabular" style={{ fontSize: 11, color: '#fff' }}>{(val||0).toFixed(2)}</span>;
                    } else {
                      const isSorted = sortCol === c.stat;
                      content = <span className="display tabular" style={{ fontSize: 14, color: isSorted ? 'var(--sky)' : '#fff' }}>{Math.round(val || 0)}</span>;
                    }
                    return <td key={c.id} style={{ padding: '8px 10px', textAlign: c.align || 'left' }}>{content}</td>;
                  })}
                </tr>
              );
            })}
            {data.length === 0 && (
              <tr><td colSpan={cols.length} style={{ padding: 40, textAlign: 'center', color: 'rgba(232,238,244,0.5)' }}>No results match filters.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function DarkSelect({ value, onChange, options }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value)} style={{
      padding: '7px 26px 7px 12px', fontSize: 12, fontWeight: 600,
      background: 'rgba(107,171,198,0.08)',
      border: '1px solid rgba(107,171,198,0.3)', borderRadius: 6,
      color: '#E8EEF4', letterSpacing: '0.02em', appearance: 'none',
      backgroundImage: `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236BABC6' stroke-width='1.5' fill='none'/></svg>")`,
      backgroundRepeat: 'no-repeat', backgroundPosition: 'right 10px center',
      cursor: 'pointer',
    }}>
      {options.map(([v, l]) => <option key={v} value={v} style={{ background: '#0B1F42' }}>{l}</option>)}
    </select>
  );
}

Object.assign(window, { BroadcastDirection });

</script>
<script type="text/babel">
// app.jsx — root app, direction switching, tweaks, modal state

function App() {
  const [tweaks, setTweaks] = React.useState(window.__TWEAKS__);
  const [editMode, setEditMode] = React.useState(false);
  const [selectedPlayer, setSelectedPlayer] = React.useState(null);
  const [filters, setFilters] = React.useState({
    gender: 'Both', age: '', team: '', search: '',
  });

  // Keep global tweaks synced so other components reading window.__TWEAKS__ see updates
  React.useEffect(() => { window.__TWEAKS__ = tweaks; }, [tweaks]);

  // Edit-mode host protocol — listener FIRST, then announce
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateTweak = (partial) => {
    const next = { ...tweaks, ...partial };
    setTweaks(next);
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: partial }, '*');
  };

  // Restore localStorage
  React.useEffect(() => {
    try {
      const saved = localStorage.getItem('buvc_direction');
      if (saved && ['editorial','cards','broadcast'].includes(saved)) {
        setTweaks(t => ({ ...t, direction: saved }));
      }
    } catch {}
  }, []);
  React.useEffect(() => {
    try { localStorage.setItem('buvc_direction', tweaks.direction); } catch {}
  }, [tweaks.direction]);

  const Dir = tweaks.direction === 'cards' ? CardsDirection
           : tweaks.direction === 'broadcast' ? BroadcastDirection
           : EditorialDirection;

  return (
    <>
      <Dir
        filters={filters}
        onFilter={setFilters}
        onSelect={setSelectedPlayer}
      />
      {selectedPlayer && (
        <PlayerModal
          player={selectedPlayer}
          onClose={() => setSelectedPlayer(null)}
          allPlayers={ALL_PLAYERS}
        />
      )}
      {editMode && <TweaksPanel tweaks={tweaks} onChange={updateTweak}/>}
    </>
  );
}

function TweaksPanel({ tweaks, onChange }) {
  return (
    <div style={{
      position: 'fixed', right: 16, bottom: 16, zIndex: 1000,
      width: 280, background: '#fff', borderRadius: 12,
      boxShadow: '0 20px 50px -10px rgba(11,31,66,0.3), 0 0 0 1px rgba(11,31,66,0.08)',
      overflow: 'hidden', fontFamily: 'Inter',
    }}>
      <div style={{
        padding: '12px 16px', background: '#0B1F42', color: '#fff',
        display: 'flex', alignItems: 'center', gap: 8,
      }}>
        <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#6BABC6' }}/>
        <span className="display" style={{ fontSize: 14, letterSpacing: '0.12em' }}>TWEAKS</span>
      </div>
      <div style={{ padding: 16 }}>
        <TweakGroup label="Design Direction">
          <div style={{ display: 'grid', gap: 6 }}>
            {[
              { id: 'editorial', label: 'Editorial · Magazine' },
              { id: 'cards', label: 'Cards · Trading' },
              { id: 'broadcast', label: 'Broadcast · Dark' },
            ].map(opt => (
              <button key={opt.id} onClick={() => onChange({ direction: opt.id })} style={{
                padding: '10px 12px', borderRadius: 6, textAlign: 'left', fontSize: 12, fontWeight: 600,
                background: tweaks.direction === opt.id ? '#0B1F42' : '#f4f3ee',
                color: tweaks.direction === opt.id ? '#fff' : '#0B1F42',
                border: '1px solid ' + (tweaks.direction === opt.id ? '#0B1F42' : 'rgba(11,31,66,0.1)'),
              }}>{opt.label}</button>
            ))}
          </div>
        </TweakGroup>

        <TweakGroup label="Show Medals on Top 3">
          <Toggle checked={tweaks.showMedals} onChange={v => onChange({ showMedals: v })}/>
        </TweakGroup>

        <TweakGroup label="Show Podium / Leaders">
          <Toggle checked={tweaks.showPodium} onChange={v => onChange({ showPodium: v })}/>
        </TweakGroup>
      </div>
    </div>
  );
}

function TweakGroup({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{
        fontSize: 10, color: '#0B1F42', opacity: 0.7, letterSpacing: '0.12em', textTransform: 'uppercase',
        fontWeight: 700, marginBottom: 8,
      }}>{label}</div>
      {children}
    </div>
  );
}

function Toggle({ checked, onChange }) {
  return (
    <button onClick={() => onChange(!checked)} style={{
      width: 44, height: 24, borderRadius: 12, position: 'relative',
      background: checked ? '#0B1F42' : 'rgba(11,31,66,0.15)',
      transition: 'background 0.15s',
    }}>
      <span style={{
        position: 'absolute', top: 2, left: checked ? 22 : 2,
        width: 20, height: 20, borderRadius: '50%', background: '#fff',
        transition: 'left 0.18s',
        boxShadow: '0 1px 3px rgba(11,31,66,0.3)',
      }}/>
    </button>
  );
}

// Mount
const bootEl = document.getElementById('boot');
if (bootEl) bootEl.remove();
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
